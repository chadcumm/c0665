<div class="location-config" *ngIf="!loading(); else loadingTpl">
  <div class="lc-header">
    <div class="lc-title">
      <h3>Locations</h3>
      <span class="lc-last-saved" *ngIf="lastSaved()">Last saved: {{ lastSaved() }}</span>
    </div>
    <div class="lc-actions">
      <!-- Save/Discard buttons added in Task 8 -->
    </div>
  </div>

  <div class="lc-scope">
    <span>Workflow:</span>
    <nz-select [ngModel]="selectedWorkflow()" (ngModelChange)="onWorkflowChange($event)">
      <nz-option *ngFor="let w of workflowOptions" [nzValue]="w.value" [nzLabel]="w.label"></nz-option>
    </nz-select>

    <span>Route:</span>
    <nz-select [ngModel]="selectedSubroute()" (ngModelChange)="onSubrouteChange($event)">
      <nz-option *ngFor="let s of subrouteOptions" [nzValue]="s.value" [nzLabel]="s.label"></nz-option>
    </nz-select>

    <span class="lc-count">{{ inScopeCount() }} locations</span>
  </div>

  <nz-alert *ngIf="loadError()" nzType="error" [nzMessage]="loadError()!" nzShowIcon></nz-alert>

  <div class="lc-body">
    <div class="lc-list">
      <!-- List pane added in Task 6 -->
      <em>List pane coming in Task 6.</em>
    </div>
    <div class="lc-editor">
      <!-- Editor added in Task 7 -->
      <em>Editor coming in Task 7.</em>
    </div>
  </div>
</div>

<ng-template #loadingTpl>
  <nz-spin nzTip="Loading configuration..."></nz-spin>
</ng-template>
